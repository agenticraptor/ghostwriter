name: Bug report
description: Report a problem with ghostwriter
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for filing a bug! Please fill out the details below so we can reproduce it.
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `ghostwriter version`
      placeholder: ghostwriter 0.1.0 (commit abc1234, built ...)
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including the exact command you ran.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Paste relevant output. Tip — run with `--no-ai --print` to check whether the model is involved.
      render: shell
